name: PR CI

on:
  pull_request:

jobs:
  validate:
    name: Build, test, vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: go build ./cmd/...

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...
